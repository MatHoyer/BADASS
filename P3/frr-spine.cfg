! BADASS P3 — Route Reflector spine (router-1). Paste: vtysh -c 'conf t' or copy to /etc/frr/frr.conf
! Underlay: /30 p2p to each leaf; loopback 1.1.1.1/32; OSPF area 0; iBGP EVPN RR.

frr version 8.4
frr defaults traditional
hostname spine-rr
service integrated-vtysh-config
!
interface eth0
 ip address 10.1.1.1/30
 ip ospf area 0
!
interface eth1
 ip address 10.1.1.5/30
 ip ospf area 0
!
interface eth2
 ip address 10.1.1.9/30
 ip ospf area 0
!
interface lo
 ip address 1.1.1.1/32
 ip ospf area 0
!
router bgp 1
 neighbor ibgp peer-group
 neighbor ibgp remote-as 1
 neighbor ibgp update-source lo
 bgp listen range 1.1.1.0/29 peer-group ibgp
 !
 address-family l2vpn evpn
  neighbor ibgp activate
  neighbor ibgp route-reflector-client
 exit-address-family
!
router ospf
!
line vty
!
end
