! BADASS P3 — leaf router-2 (lo 1.1.1.2, underlay toward spine 10.1.1.2/30).

frr version 8.4
frr defaults traditional
hostname leaf-2
service integrated-vtysh-config
!
interface eth0
 ip address 10.1.1.2/30
 ip ospf area 0
!
interface lo
 ip address 1.1.1.2/32
 ip ospf area 0
!
router bgp 1
 neighbor 1.1.1.1 remote-as 1
 neighbor 1.1.1.1 update-source lo
 !
 address-family l2vpn evpn
  neighbor 1.1.1.1 activate
  advertise-all-vni
 exit-address-family
!
router ospf
!
line vty
!
end
